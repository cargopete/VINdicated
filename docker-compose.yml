services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8089:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - RUST_LOG=vindicate_api=info,tower_http=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - vindicate

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - vindicate

networks:
  vindicate:
    driver: bridge

volumes:
  redis_data:
