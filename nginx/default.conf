server {
    listen 80;
    server_name vindicate-app.com www.vindicate-app.com;

    # ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vindicate-app.com www.vindicate-app.com;

    ssl_certificate /etc/letsencrypt/live/vindicate-app.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vindicate-app.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # API
    location /v1/ {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting — 30 req/min per IP
        limit_req zone=api burst=10 nodelay;
    }

    # Everything else → Next.js on Vercel (handled via DNS; API is the only self-hosted piece)
    location / {
        return 302 https://vindicate-app.com$request_uri;
    }
}

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
